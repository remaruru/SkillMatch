services:
  # ── Backend API (Web Service) ──────────────────────────────────────────────
  - type: web
    name: skillmatch-backend
    runtime: node
    plan: free # Correct for Web Services with Node runtime
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false

  # ── Frontend (Static Site) ─────────────────────────────────────────────────
  - type: web
    name: skillmatch-frontend
    runtime: static # Important: This tells Render it's a static site
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
