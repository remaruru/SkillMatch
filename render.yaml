services:
  # ── Backend API (Web Service) ──────────────────────────────────────────────
  - type: web
    name: skillmatch-backend
    runtime: node
    plan: free # Explicitly set to free tier
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false

  # ── Frontend (Static Site) ─────────────────────────────────────────────────
  - type: web
    name: skillmatch-frontend
    runtime: static
    plan: free # Explicitly set to free tier
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        sync: false
