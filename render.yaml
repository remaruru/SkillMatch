services:
  # ── Backend API (Web Service) ──────────────────────────────────────────────
  - type: web
    name: skillmatch-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: skillmatch-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false

  # ── Frontend (Static Site) ─────────────────────────────────────────────────
  - type: web
    name: skillmatch-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        sync: false

# ── PostgreSQL Database ────────────────────────────────────────────────────
databases:
  - name: skillmatch-db
    databaseName: skillmatch
    user: skillmatch
    plan: free
